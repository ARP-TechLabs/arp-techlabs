<ng-container *ngIf="!isLoading; else loadingScreen">
  <app-header></app-header>
  <router-outlet></router-outlet>
  <app-footer></app-footer>
  <app-back-top></app-back-top>
</ng-container>

<div class="cursor" #cursor></div>
<!-- Custom cursor -->
<ng-template #loadingScreen>
  <div id="app">
    <div class="loader-screen">
      <div class="opt"><i class="fa-solid fa-robot fa-bounce"></i></div>
      <h1 class="brand">ARP TechLabs</h1>
      <span class="sub">Lines of code, Waves of Change</span>
      <p class="note">Use desktop for better UI experience</p>
    </div>
  </div>
</ng-template>
