<!-- Blog Page Header -->
<div class="blog-header text-center text-white d-flex align-items-center justify-content-center" 
     style="background: linear-gradient(rgba(166, 201, 253, 0.8), rgba(46, 130, 255, 0.8)), url('assets/blogs/blog-bg.jpg') center/cover no-repeat; height: 300px;">
  <div>
    <h1 class="fw-bold">Our Blog</h1>
    <p class="lead">Latest Insights, Case Studies & Tech Stories from ARP TechLabs</p>
  </div>
</div>

<!-- Filters -->
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-10 d-flex flex-wrap align-items-center gap-2">
      
      <!-- Category Filter -->
      <select class="form-select w-auto" [(ngModel)]="selectedCategory">
        <option value="">All Categories</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>

      <!-- Date Sort -->
      <select class="form-select w-auto" [(ngModel)]="selectedSort">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>

    </div>
  </div>
</div>

<!-- Blog List -->
<div class="container my-5">
  <div class="row">
    <div class="col-12">
      <div *ngFor="let blog of filteredBlogs()" class="card mb-3 shadow-sm border-0 blog-card">
        <div class="row g-0 align-items-center">
          
          <!-- Left Image -->
          <div class="col-md-2">
            <img [src]="blog.img" class="img-fluid rounded-start" alt="Blog image" />
          </div>
          
          <!-- Middle Content -->
          <div class="col-md-7">
            <div class="card-body">
              <span class="badge bg-accent mb-2">{{ blog.category }}</span>
              <h5 class="card-title fw-bold mb-1">{{ blog.description }}</h5>
              <p class="card-text mb-0">
                <small class="text-muted">By {{ blog.author }}</small>
              </p>
            </div>
          </div>
          
          <!-- Right Side -->
          <div class="col-md-3 text-center p-3">
            <p class="text-muted small mb-2">{{ blog.date }}</p>
            <a [href]="blog.link" target="_blank" class="btn btn-accent btn-sm">
              <i class="fa fa-link me-1"></i> Read More
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
